<section id="contact" class="py-24 px-6">
  <div class="max-w-3xl mx-auto text-center">
    <p class="text-primary font-semibold tracking-widest text-sm uppercase mb-3">RESTONS EN CONTACT</p>
    <h2 class="font-display text-4xl md:text-5xl font-bold mb-4">Travaillons Ensemble</h2>
    <p class="text-light/60 mb-12">Je suis disponible pour de nouveaux projets passionnants. N'hésitez pas à me contacter !</p>

    <div class="grid sm:grid-cols-3 gap-6 mb-12">
      <div *ngFor="let item of contactItems"
           class="p-6 rounded-3xl border border-white/10 bg-gradient-to-br from-white/5 to-white/[0.02] hover:border-primary hover:-translate-y-1 transition-all duration-300 group">
        <div class="w-12 h-12 mx-auto mb-4 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-xl group-hover:scale-110 transition-transform">
          {{ item.icon }}
        </div>
        <h3 class="font-semibold text-accent mb-2">{{ item.label }}</h3>
        <p class="text-light/60 text-sm">{{ item.value }}</p>
        <p *ngIf="item.sub" class="text-light/40 text-xs mt-1">{{ item.sub }}</p>
      </div>
    </div>

    <div class="flex flex-wrap justify-center gap-4">
      <a href="mailto:annebarbaratebu@gmail.com"
         class="px-8 py-3.5 rounded-full font-semibold bg-gradient-to-r from-primary to-secondary text-white shadow-lg shadow-primary/30 hover:-translate-y-1 hover:shadow-xl transition-all duration-300">
        📩 Envoyez-moi un message
      </a>
      <a href="assets/docs/CV_Anne_Barbara_Tebu.pdf"
         download="CV_Anne_Barbara_Tebu.pdf"
         class="px-8 py-3.5 rounded-full font-semibold border-2 border-light/40 text-light hover:bg-light hover:text-dark transition-all duration-300 hover:-translate-y-1 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        </svg>
        Télécharger mon CV
      </a>
    </div>
  </div>
</section>
