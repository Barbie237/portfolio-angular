<nav class="fixed top-0 w-full z-50 backdrop-blur-md bg-dark/80 border-b border-white/10">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    <a class="font-display text-xl font-bold bg-gradient-to-r from-primary to-accent bg-clip-text text-transparent cursor-pointer"
       (click)="scrollTo('home')">ABT</a>
    <ul class="hidden md:flex gap-8 list-none m-0 p-0">
      <li *ngFor="let link of navLinks">
        <a (click)="scrollTo(link.anchor)"
           class="text-light/80 hover:text-primary transition-colors cursor-pointer font-medium text-sm tracking-wide relative group">
          {{ link.label }}
          <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-gradient-to-r from-primary to-accent transition-all duration-300 group-hover:w-full"></span>
        </a>
      </li>
    </ul>
    <!-- Mobile menu button -->
    <button class="md:hidden text-light p-2" (click)="toggleMenu()">
      <svg *ngIf="!menuOpen" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
      <svg *ngIf="menuOpen" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
  <!-- Mobile menu -->
  <div *ngIf="menuOpen" class="md:hidden bg-dark/95 border-t border-white/10 px-6 py-4 flex flex-col gap-4">
    <a *ngFor="let link of navLinks" (click)="scrollTo(link.anchor); toggleMenu()"
       class="text-light/80 hover:text-primary cursor-pointer font-medium">{{ link.label }}</a>
  </div>
</nav>
