<section id="skills" class="py-24 px-6 bg-black/20">
  <div class="max-w-7xl mx-auto">
    <div class="text-center mb-16">
      <p class="text-primary font-semibold tracking-widest text-sm uppercase mb-3">EXPERTISE TECHNIQUE</p>
      <h2 class="font-display text-4xl md:text-5xl font-bold mb-4">Compétences</h2>
      <p class="text-light/60 max-w-xl mx-auto">Un arsenal complet de technologies modernes pour créer des applications web de qualité.</p>
    </div>
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div *ngFor="let cat of categories"
           class="p-6 rounded-3xl border border-white/10 bg-gradient-to-br from-white/5 to-white/[0.02] hover:border-primary hover:-translate-y-1 transition-all duration-300">
        <h3 class="text-lg font-semibold mb-5 text-accent flex items-center gap-3">
          <span class="text-xl">{{ cat.icon }}</span>{{ cat.title }}
        </h3>
        <div class="flex flex-col gap-3">
          <div *ngFor="let skill of cat.skills">
            <div class="flex justify-between text-sm mb-1">
              <span class="text-light/80">{{ skill.name }}</span>
              <span class="text-light/40">{{ skill.level }}%</span>
            </div>
            <div class="w-full h-2 bg-white/10 rounded-full overflow-hidden">
              <div class="h-full rounded-full bg-gradient-to-r from-primary to-accent skill-bar"
                   [style.width.%]="skill.level">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
